name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release Type'
        required: true
        default: 'stable'
        type: choice
        options:
          - stable
          - pre-release

permissions:
  contents: read

jobs:
  run-release:
    name: Run release
    runs-on: ubuntu-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: 'package.json'
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ] && [ "${{ github.event.release.prerelease }}" = "true" ]; then
            echo "type=pre-release" >> "$GITHUB_OUTPUT"
          else
            echo "type=${{ inputs.release_type || 'stable' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate release tag matches package version
        if: ${{ github.event_name == 'release' }}
        shell: bash
        run: |
          package_version="$(node -p "require('./package.json').version")"
          release_tag="${{ github.event.release.tag_name }}"
          release_version="${release_tag#v}"

          if [ "$release_version" != "$package_version" ]; then
            echo "Release tag ($release_tag) does not match package version ($package_version)." >&2
            exit 1
          fi

      - name: Package Extension
        shell: bash
        run: |
          if [ "${{ steps.release_meta.outputs.type }}" = "pre-release" ]; then
            pnpm dlx @vscode/vsce package --no-dependencies --pre-release
          else
            pnpm dlx @vscode/vsce package --no-dependencies
          fi

      - name: Get VSIX Path
        id: vsix_file
        run: echo "name=$(ls *.vsix)" >> $GITHUB_OUTPUT

      - name: Upload Extension Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.vsix_file.outputs.name }}
          path: ${{ steps.vsix_file.outputs.name }}
          retention-days: 5

      - name: Publish to Open VSX Registry
        if: ${{ github.event_name == 'release' && steps.release_meta.outputs.type == 'stable' }}
        uses: HaaLeo/publish-vscode-extension@v1
        with:
          pat: ${{ secrets.OPEN_VSX_TOKEN }}
          extensionFile: ${{ steps.vsix_file.outputs.name }}

      - name: Publish to Visual Studio Marketplace
        if: ${{ github.event_name == 'release' }}
        uses: HaaLeo/publish-vscode-extension@v1
        with:
          pat: ${{ secrets.VS_MARKETPLACE_TOKEN }}
          preRelease: ${{ steps.release_meta.outputs.type == 'pre-release' }}
          registryUrl: https://marketplace.visualstudio.com
          extensionFile: ${{ steps.vsix_file.outputs.name }}
