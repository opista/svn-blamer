name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: pnpm/action-setup@v3
      with:
        version: 9
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'pnpm'
    - run: pnpm install
    - run: pnpm run compile-tests
    # Run unit tests only, excluding integration tests that require VS Code
    - run: npx mocha --ui tdd out/test/*.test.js --exclude out/test/extension.test.js
